# ─── Database ──────────────────────────────────────────────────────────────────
# Default: embedded H2 for local development.
spring.datasource.url=jdbc:h2:mem:ott_platform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ─── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.ott.platform=DEBUG
logging.level.org.springframework.web=INFO

# ─── Jackson (prevent infinite recursion on bidirectional relationships) ─────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
